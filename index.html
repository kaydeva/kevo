<body>
  <script>
    window.addEventListener("error", function(e) {
      const errDiv = document.createElement("div");
      errDiv.style = "position:fixed;top:0;left:0;z-index:99999;background:red;color:white;padding:20px;font-family:monospace;width:100%;";
      errDiv.innerText = "RUNTIME ERROR: " + e.message + "\n" + (e.error && e.error.stack ? e.error.stack : "");
      document.body.appendChild(errDiv);
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
